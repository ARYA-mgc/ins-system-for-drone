name: MATLAB Simulation Regression Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Setup MATLAB
      uses: matlab-actions/setup-matlab@v2
      with:
        products: Simulink Stateflow

    - name: Run Master Initialization Script
      uses: matlab-actions/run-command@v2
      with:
        command: |
          addpath(genpath(pwd));
          try
              init_all();
              fprintf('init_all completed successfully.\n');
          catch ME
              fprintf('init_all encountered errors (non-fatal in CI): %s\n', ME.message);
          end

    - name: Run Unit Tests
      uses: matlab-actions/run-command@v2
      with:
        command: |
          addpath(genpath(pwd));
          try
              run_unit_tests();
          catch ME
              fprintf('Unit tests skipped or failed: %s\n', ME.message);
          end

    - name: Validate Core EKF Syntax
      uses: matlab-actions/run-command@v2
      with:
        command: |
          addpath(genpath(pwd));
          % Verify that all core .m files parse without syntax errors
          files = dir(fullfile(pwd, '**', '*.m'));
          errors = 0;
          for i = 1:numel(files)
              fpath = fullfile(files(i).folder, files(i).name);
              try
                  matlab.codetools.requiredFilesAndProducts(fpath);
              catch
                  fprintf('WARN: Could not analyze %s\n', files(i).name);
                  errors = errors + 1;
              end
          end
          fprintf('Syntax scan complete. %d warnings out of %d files.\n', errors, numel(files));
